name: Build & Deploy FE (short cmds)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ZIP: dist.zip
      INCOMING: C:\deploy\incoming\fe
      STAGING:  C:\deploy\incoming\fe\_staging
      BACKUP:   C:\deploy\backups\fe
      LIVE:     C:\sites\myapp-fe\dist
      SITE:     myapp-fe
      POOL:     myapp-fe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - name: Build (Vite)
        run: |
          npm ci
          npm run build

      - name: Zip dist (1 file duy nhất)
        run: |
          cd dist
          zip -rq ../$ZIP .
          cd ..
          ls -lh $ZIP

      - name: Ensure folders on VPS (ngắn)
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.WIN_PASSWORD }}" \
            ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} \
            "powershell -NoProfile -c \"New-Item -Type Directory -Force -Path '$env:INCOMING','$env:BACKUP','$env:LIVE' | Out-Null\""

      - name: Upload ZIP via scp (tránh lỗi /C:/ mkdir)
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" \
            scp -P ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no \
            $ZIP ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }}:/C:/deploy/incoming/fe/$ZIP

      # --- Các lệnh dưới đây NGẮN, tách nhỏ, mỗi lệnh < 8k ký tự ---

      - name: Clean & Unzip to STAGING
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} ^
          "powershell -NoProfile -c \"Remove-Item '$env:STAGING' -Recurse -Force -EA SilentlyContinue; New-Item -Type Directory -Force -Path '$env:STAGING'|Out-Null; Expand-Archive -Path (Join-Path '$env:INCOMING' '$env:ZIP') -DestinationPath '$env:STAGING' -Force\""

      - name: Backup LIVE
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} ^
          "powershell -NoProfile -c \"\$bk=(Join-Path '$env:BACKUP' (Get-Date -f yyyyMMdd-HHmmss)); New-Item -Type Directory -Force -Path \$bk|Out-Null; robocopy '$env:LIVE' \$bk /MIR /NFL /NDL /NP /NJH /NJS | Out-Null\""

      - name: Mirror STAGING -> LIVE
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} ^
          "powershell -NoProfile -c \"robocopy '$env:STAGING' '$env:LIVE' /MIR /NFL /NDL /NP /NJH /NJS; if(\$LASTEXITCODE -gt 3){throw 'robocopy failed '+\$LASTEXITCODE}\""

      # ---- FIX 401.3: ACL + Anonymous ----
      - name: Fix ACL (AppPool read)
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} ^
          "powershell -NoProfile -c \"icacls 'C:\sites','C:\sites\myapp-fe','$env:LIVE' /inheritance:e | Out-Null; icacls 'C:\sites','C:\sites\myapp-fe','$env:LIVE' /grant 'IIS AppPool\$env:POOL:(OI)(CI)(RX)' /T /C | Out-Null\""

      - name: Enable Anonymous & Allow *
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} ^
          "powershell -NoProfile -c \"& \$env:SystemRoot\system32\inetsrv\appcmd.exe set config '$env:SITE/' /section:anonymousAuthentication /enabled:true /userName: /password:; & \$env:SystemRoot\system32\inetsrv\appcmd.exe set config '$env:SITE/' /section:windowsAuthentication /enabled:false; & \$env:SystemRoot\system32\inetsrv\appcmd.exe set config '$env:SITE/' /section:basicAuthentication /enabled:false; & \$env:SystemRoot\system32\inetsrv\appcmd.exe set config '$env:SITE/' /section:authorization /clear; & \$env:SystemRoot\system32\inetsrv\appcmd.exe set config '$env:SITE/' /section:authorization \"/+[accessType='Allow',users='*']\"\""

      - name: Write version.txt
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} ^
          "powershell -NoProfile -c \"\$v='sha=${{ github.sha }}`r`nbranch=${{ github.ref_name }}`r`ndeployed='+ (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss')+'Z'; Set-Content -Path (Join-Path '$env:LIVE' 'version.txt') -Value \$v -Encoding utf8\""

      - name: Recycle app pool & list latest files
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} ^
          "powershell -NoProfile -c \"& \$env:SystemRoot\system32\inetsrv\appcmd.exe recycle apppool /apppool.name:$env:POOL; Get-ChildItem '$env:LIVE' -Recurse | Sort LastWriteTime -Desc | Select -First 8 FullName,LastWriteTime | ft -AutoSize | Out-String | Write-Host\""

      - name: Show version (confirm)
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" ssh -p ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} ^
          "powershell -NoProfile -c \"Get-Content '$env:LIVE\version.txt' | Write-Host\""
