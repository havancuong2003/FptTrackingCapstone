name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        run: |
          npm ci
          npm run build
        # Vite sẽ copy public/web.config vào dist/

      - name: Zip dist
        run: |
          cd dist
          zip -rq ../dist.zip .
          cd ..
          ls -l dist.zip

      # Upload dist.zip vào C:\deploy\incoming\fe
      - name: Upload dist.zip to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: dist.zip
          target: C:/deploy/incoming/fe
          debug: true

      # Upload script .ps1 vào C:\deploy\incoming\fe
      - name: Upload deploy script to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: .deploy/deploy-fe.ps1
          target: C:/deploy/incoming/fe

      # Chạy script .ps1 vừa upload
      - name: Run deploy on VPS (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass `
              -File "C:\deploy\incoming\fe\deploy-fe.ps1" `
              -Sha "${{ github.sha }}" -Branch "${{ github.ref_name }}"
