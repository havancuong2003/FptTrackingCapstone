name: FE → IIS (SSH, no-zip)

on:
  push:
    branches: [ master ]     # đổi nếu bạn dùng nhánh khác

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build FE
        run: |
          npm ci
          npm run build
        # web.config giữ nguyên nằm trong dist (Vite copy từ public)

      # Dùng scp/ssh gốc (tránh lỗi đường dẫn của appleboy/drone-scp)
      - name: Install ssh client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Create remote incoming/<SHA>
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=accept-new -p ${{ secrets.WIN_SSH_PORT }} \
          ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} \
          'powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path ''C:\deploy\incoming\fe\${{ github.sha }}'' | Out-Null"'

      - name: Upload dist via native scp (NO zip)
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" \
          scp -P ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=accept-new -r \
          dist/* ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }}:"C:/deploy/incoming/fe/${{ github.sha }}/"

      - name: Atomic mirror to LIVE (robocopy /MIR)
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=accept-new -p ${{ secrets.WIN_SSH_PORT }} \
          ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} powershell -NoProfile -Command "
            \$incoming = 'C:\deploy\incoming\fe\${{ github.sha }}';
            \$live     = 'C:\sites\myapp-fe\dist';

            if (-not (Test-Path \$live)) { New-Item -ItemType Directory -Force -Path \$live | Out-Null }

            # backup để rollback nhanh
            \$backupRoot = 'C:\deploy\backups\fe';
            New-Item -ItemType Directory -Force -Path \$backupRoot | Out-Null
            \$stamp  = Get-Date -Format 'yyyyMMdd-HHmmss'
            \$backup = Join-Path \$backupRoot \$stamp
            robocopy \$live \$backup /MIR /NFL /NDL /NJH /NJS | Out-Null

            # deploy: mirror staging -> live (không chạm web.config trừ khi bạn build mới)
            robocopy \$incoming \$live /MIR /NFL /NDL /NJH /NJS | Out-Null

            # ghi version để bạn kiểm tra nhanh
            \$ver = @('sha=${{ github.sha }}','branch=${{ github.ref_name }}','deployed=' + (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z') -join \"`r`n\"
            Set-Content -Path (Join-Path \$live 'version.txt') -Value \$ver -Encoding utf8
          "

      - name: Show version
        run: |
          sshpass -p "${{ secrets.WIN_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=accept-new -p ${{ secrets.WIN_SSH_PORT }} \
          ${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }} \
          'powershell -NoProfile -Command "Get-Content ''C:\sites\myapp-fe\dist\version.txt'' | Write-Host"'
