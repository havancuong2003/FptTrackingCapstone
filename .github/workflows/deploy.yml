name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -rq ../dist.zip .
          cd ..
          ls -l dist.zip

      - name: Upload dist.zip to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: "dist.zip"
          target: "C:/deploy/incoming/fe"
          timeout: 60s
          command_timeout: 20m

      - name: Deploy on VPS (run a PS1 file)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command ^
              "$script = @'
              # --- CONFIG ---
              $incoming = 'C:\deploy\incoming\fe'
              $zip      = Join-Path $incoming 'dist.zip'
              $staging  = Join-Path $incoming '_staging'
              $live     = 'C:\sites\myapp-fe\dist'
              $appPool  = 'myapp-fe'                                       # TÊN APP POOL
              $principal = 'IIS AppPool\{0}' -f $appPool                   # 'IIS AppPool\myapp-fe'
              # --------------

              if (!(Test-Path $zip)) { throw ('Zip not found: ' + $zip) }

              # Giải nén vào staging
              if (Test-Path $staging) { Remove-Item $staging -Recurse -Force -ErrorAction SilentlyContinue }
              New-Item -ItemType Directory -Force -Path $staging | Out-Null
              Expand-Archive -Path $zip -DestinationPath $staging -Force

              # KHÔNG xóa thư mục live để giữ kế thừa ACL; nếu chưa có thì tạo
              if (!(Test-Path $live)) {
                New-Item -ItemType Directory -Force -Path $live | Out-Null
              }

              # Sync nội dung
              robocopy $staging $live /MIR /NFL /NDL /NP /NJH /NJS | Out-Null

              # BẬT kế thừa ACL & CẤP quyền đọc cho AppPool
              icacls $live /inheritance:e | Out-Null
              icacls $live /grant '$principal:(OI)(CI)(RX)' /T | Out-Null

              # (Tuỳ chọn) bảo đảm Anonymous được bật (chỉ chạy 1 lần)
              Import-Module WebAdministration
              Set-WebConfigurationProperty -PSPath 'IIS:\Sites\myapp-fe' `
                -Filter '/system.webServer/security/authentication/anonymousAuthentication' `
                -Name enabled -Value $true | Out-Null

              # Restart AppPool
              Restart-WebAppPool -Name $appPool

              # Log nhanh
              '--- ACL of LIVE ---'
              icacls $live | Out-String
              '--- TOP files ---'
              Get-ChildItem $live -Recurse | Sort-Object LastWriteTime -Desc | Select -First 5 FullName, LastWriteTime | Format-Table -AutoSize | Out-String
              '@
              ; $tmp = 'C:\deploy\scripts'; New-Item -ItemType Directory -Force -Path $tmp | Out-Null;
              $ps1 = Join-Path $tmp 'deploy-fe.ps1';
              Set-Content -Path $ps1 -Value $script -Encoding UTF8;
              powershell -NoProfile -ExecutionPolicy Bypass -File $ps1"
