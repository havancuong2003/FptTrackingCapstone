name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]

jobs:
  deploy-fe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build

      # 1) Pre-create target folder on VPS (deep path) bằng PowerShell
      - name: Prepare target dir on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 15m
          script: |
            powershell -NoProfile -Command "
              $sha = '${{ github.sha }}'
              $target = 'C:\deploy\incoming\fe\' + $sha
              if (!(Test-Path $target)) {
                New-Item -ItemType Directory -Force -Path $target | Out-Null
              }
            "

      # 2) Upload tất cả file trong dist/ qua SFTP
      #    LƯU Ý: target phải là /C:/... (có dấu / ở đầu, và dùng / thay vì \)
      - name: Upload dist to VPS (SCP, no zip)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: "dist/**"
          target: "/C:/deploy/incoming/fe/${{ github.sha }}"
          overwrite: true
          timeout: 60s
          command_timeout: 10m

      # 3) Mirror sang LIVE bằng robocopy
      - name: Deploy on VPS (robocopy /MIR)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            powershell -NoProfile -Command "
              $sha  = '${{ github.sha }}'
              $src  = 'C:\deploy\incoming\fe\' + $sha
              $dest = 'C:\sites\myapp-fe\dist'
              if (!(Test-Path $dest)) { New-Item -ItemType Directory -Force -Path $dest | Out-Null }
              robocopy $src $dest /MIR /NFL /NDL /NJH /NJS /NP | Out-Null
            "
