name: Build & Deploy FE to IIS (native scp)

on:
  push:
    branches: [ master ]   # đổi nếu cần

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build
        # Lưu ý: web.config của bạn giữ nguyên, đảm bảo có trong dist/ (đặt ở public/ nếu dùng Vite)

      # Tạo sẵn staging & live trên server (để scp KHÔNG còn phải mkdir)
      - name: Ensure STAGING & LIVE exist (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 10m
          script: |
            powershell -NoProfile -Command "
              $staging = 'C:\deploy\incoming\fe_tmp';
              $live    = 'C:\sites\myapp-fe\dist';
              if (!(Test-Path $staging)) { New-Item -ItemType Directory -Force -Path $staging | Out-Null }
              if (!(Test-Path $live))    { New-Item -ItemType Directory -Force -Path $live    | Out-Null }
            "

      # ===== GIẢI PHÁP KHÁC: native scp, KHÔNG dùng appleboy/scp-action =====
      - name: Upload dist via native scp (NO zip)
        env:
          HOST: ${{ secrets.WIN_HOST }}
          PORT: ${{ secrets.WIN_SSH_PORT }}
          USER: ${{ secrets.WIN_USER }}
        run: |
          # Đường dẫn SFTP Windows nên dùng /C:/...  (có dấu / đầu)
          DEST="/C:/deploy/incoming/fe_tmp/"
          # Tắt xác thực host key cho lần đầu
          scp -P "$PORT" -o StrictHostKeyChecking=no -r dist/* "${USER}@${HOST}:${DEST}"

      # Mirror sang LIVE + ghi version, KHÔNG import IIS, KHÔNG restart app pool
      - name: Deploy to LIVE (robocopy /MIR)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 10m
          script: |
            powershell -NoProfile -Command "
              $src  = 'C:\deploy\incoming\fe_tmp';
              $live = 'C:\sites\myapp-fe\dist';

              robocopy $src $live /MIR /NFL /NDL /NJH /NJS /NP | Out-Null

              $ver = @(
                'sha=${{ github.sha }}',
                'branch=${{ github.ref_name }}',
                'deployed=' + (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z'
              ) -join \"`r`n\"
              Set-Content -Path (Join-Path $live 'version.txt') -Value $ver -Encoding utf8

              Get-ChildItem $live -Recurse |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 8 FullName, LastWriteTime |
                Format-Table -AutoSize | Out-String | Write-Host
            "
