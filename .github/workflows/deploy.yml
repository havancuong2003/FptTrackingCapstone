name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]   # đổi nếu bạn deploy từ nhánh khác

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    env:
      LIVE_DIR:  C:/sites/myapp-fe/dist
      INCOMING_ROOT: C:/deploy/incoming/fe
      BACKUP_ROOT:   C:/deploy/backups/fe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build
        # Vite sẽ copy web.config trong public/ vào dist/

      # === Upload dist lên VPS (SCP, NO ZIP) ===
      - name: Upload dist via SCP (NO zip)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}          # ví dụ: deploy
          password: ${{ secrets.WIN_PASSWORD }}
          port: ${{ secrets.WIN_SSH_PORT }}
          source: "dist/*"
          target: "C:/deploy/incoming/fe/${{ github.sha }}"   # KHÔNG có slash đầu/cuối
          overwrite: true
          timeout: 2m
          command_timeout: 10m

      # === Triển khai: mirror sang LIVE + backup + ghi version.txt ===
      - name: Deploy to LIVE (robocopy /MIR)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          port: ${{ secrets.WIN_SSH_PORT }}
          script_stop: true
          command_timeout: 20m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $ErrorActionPreference = 'Stop';

              $sha        = '${{ github.sha }}';
              $incoming   = Join-Path 'C:\deploy\incoming\fe' $sha;
              $live       = 'C:\sites\myapp-fe\dist';
              $backupRoot = 'C:\deploy\backups\fe';

              if (!(Test-Path $incoming)) { throw 'Incoming not found: ' + $incoming }
              if (!(Test-Path $live))     { New-Item -ItemType Directory -Force -Path $live | Out-Null }
              if (!(Test-Path $backupRoot)) { New-Item -ItemType Directory -Force -Path $backupRoot | Out-Null }

              # Backup LIVE (để rollback nhanh)
              $stamp  = Get-Date -Format 'yyyyMMdd-HHmmss';
              $backup = Join-Path $backupRoot $stamp
              robocopy $live $backup /MIR /NFL /NDL /NP /NJH /NJS | Out-Null

              # Mirror staging -> LIVE
              $rc = robocopy $incoming $live /MIR /NFL /NDL /NP /NJH /NJS
              Write-Host ('ROBOCOPY exit code: ' + $LASTEXITCODE + ' (0/1 = success)')

              # Ghi version.txt để kiểm tra nhanh
              $ver = @(
                'sha=${{ github.sha }}'
                'branch=${{ github.ref_name }}'
                ('deployed=' + (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z')
              ) -join \"`r`n\"
              Set-Content -Path (Join-Path $live 'version.txt') -Value $ver -Encoding utf8

              # In 8 file mới nhất trong LIVE cho log
              Get-ChildItem $live -Recurse |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 8 FullName, LastWriteTime |
                Format-Table -AutoSize | Out-String | Write-Host
            "

      # (Tuỳ chọn) xác nhận version
      - name: Show version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          port: ${{ secrets.WIN_SSH_PORT }}
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $live = 'C:\sites\myapp-fe\dist';
              if (Test-Path (Join-Path $live 'version.txt')) {
                Get-Content (Join-Path $live 'version.txt') | Write-Host
              } else {
                Write-Host 'version.txt not found in LIVE.'
              }
            "
