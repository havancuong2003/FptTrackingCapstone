name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]   # đổi nếu deploy từ nhánh khác

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build

      # 1) TẠO SẴN THƯ MỤC ĐÍCH qua SSH (fix lỗi SFTP không tạo được deep path)
      - name: Prepare target dir on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 10m
          script: |
            powershell -NoProfile -Command "
              $sha    = '${{ github.sha }}';
              $parent = 'C:\deploy\incoming\fe';
              $target = Join-Path $parent $sha;
              if (!(Test-Path $parent)) { New-Item -ItemType Directory -Force -Path $parent | Out-Null };
              if (!(Test-Path $target)) { New-Item -ItemType Directory -Force -Path $target | Out-Null };
            "

      # 2) SCP UPLOAD (KHÔNG NÉN) -- dùng đường dẫn SFTP CHUẨN /C:/...
      - name: Upload dist to VPS (SCP, no zip)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: "dist/**"
          target: "/C:/deploy/incoming/fe/${{ github.sha }}"
          overwrite: true
          timeout: 60s
          command_timeout: 10m
          debug: true

      # 3) MIRROR sang LIVE bằng robocopy (không cần module IIS, không restart)
      - name: Deploy on VPS (robocopy /MIR)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 10m
          script: |
            powershell -NoProfile -Command "
              $sha  = '${{ github.sha }}';
              $src  = 'C:\deploy\incoming\fe\' + $sha;
              $dest = 'C:\sites\myapp-fe\dist';
              if (!(Test-Path $dest)) { New-Item -ItemType Directory -Force -Path $dest | Out-Null };
              robocopy $src $dest /MIR /NFL /NDL /NJH /NJS /NP | Out-Null;

              # Ghi version.txt để check nhanh trên server (không ảnh hưởng app)
              $ver = @(
                'sha=${{ github.sha }}',
                'branch=${{ github.ref_name }}',
                'deployed=' + (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z'
              ) -join \"`r`n\";
              Set-Content -Path (Join-Path $dest 'version.txt') -Value $ver -Encoding utf8;
            "
