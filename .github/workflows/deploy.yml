name: FE Deploy to IIS (no-zip)

on:
  push:
    branches: [ master ]     # đổi nếu bạn dùng nhánh khác

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build

      # 1) Upload thẳng dist/* lên VPS vào thư mục theo SHA
      - name: Upload dist via SCP (NO zip)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}          # ví dụ 160.30.21.113
          username: ${{ secrets.WIN_USER }}      # deploy
          password: ${{ secrets.WIN_PASSWORD }}  # password của deploy
          port: ${{ secrets.WIN_SSH_PORT }}      # 22
          source: "dist/*"
          target: "/C:/deploy/incoming/fe/${{ github.sha }}/"
          strip_components: 0
          overwrite: true
          timeout: 2m

      # 2) Deploy trên VPS: robocopy từ staging -> live, ghi version.txt, recycle app pool
      - name: Deploy on VPS (robocopy /MIR)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          port: ${{ secrets.WIN_SSH_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            $sha = '${{ github.sha }}'
            $src = "C:\deploy\incoming\fe\$sha"
            $dst = "C:\sites\myapp-fe\dist"

            if (!(Test-Path $src)) { throw "Staging not found: $src" }
            if (!(Test-Path $dst)) { New-Item -ItemType Directory -Force -Path $dst | Out-Null }

            # optional: backup nhanh trước khi mirror
            $bkRoot = "C:\deploy\backups\fe"
            New-Item -ItemType Directory -Force -Path $bkRoot | Out-Null
            $stamp = Get-Date -Format 'yyyyMMdd-HHmmss'
            robocopy $dst (Join-Path $bkRoot $stamp) /MIR /NFL /NDL /NJH /NJS | Out-Null

            # mirror staging -> live
            robocopy $src $dst /MIR /NFL /NDL /NJH /NJS /NP

            # ghi version.txt
            $ver = @(
              "sha=$sha"
              "branch=${{ github.ref_name }}"
              "deployed=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss K')"
            ) -join "`r`n"
            Set-Content -Path (Join-Path $dst 'version.txt') -Value $ver -Encoding utf8

            # recycle app pool mà không cần WebAdministration
            & $env:windir\system32\inetsrv\appcmd recycle apppool /apppool.name:myapp-fe

      # 3) Show version (không fail pipeline nếu thiếu)
      - name: Show version
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          port: ${{ secrets.WIN_SSH_PORT }}
          script: |
            $ver = 'C:\sites\myapp-fe\dist\version.txt'
            if (Test-Path $ver) { Get-Content $ver | Write-Host } else { Write-Host 'version.txt not found' }
