name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]              # đổi nếu dùng nhánh khác

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        run: |
          npm ci
          npm run build
        # Vite sẽ copy public/web.config vào dist/

      # ĐÓNG GÓI dist thành 1 file zip để upload cho chắc chắn
      - name: Zip dist
        run: |
          cd dist
          zip -rq ../dist.zip .
          cd ..
          ls -l dist.zip

      # UPLOAD duy nhất dist.zip (không tạo thư mục con)
      - name: Upload dist.zip to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: "dist.zip"
          target: "C:/deploy/incoming/fe"     # KHÔNG có dấu "/" ở cuối
          debug: true

      # GIẢI NÉN + TRIỂN KHAI + GHI VERSION
      - name: Atomic deploy on VPS (PowerShell)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              Import-Module WebAdministration

              $zip      = 'C:\deploy\incoming\fe\dist.zip'
              $staging  = 'C:\deploy\incoming\fe\_staging'
              $incoming = 'C:\deploy\incoming\fe'
              $live     = 'C:\sites\myapp-fe\dist'

              if (!(Test-Path $incoming)) { throw 'Incoming not found: ' + $incoming }
              if (!(Test-Path $zip))      { throw 'Zip not found (upload failed): ' + $zip }
              if (!(Test-Path $live))     { New-Item -ItemType Directory -Force -Path $live | Out-Null }

              # vệ sinh staging & giải nén
              Remove-Item $staging -Recurse -Force -ErrorAction SilentlyContinue
              New-Item -ItemType Directory -Force -Path $staging | Out-Null
              Expand-Archive -Path $zip -DestinationPath $staging -Force

              # backup để rollback nhanh
              $backupRoot = 'C:\deploy\backups\fe'
              New-Item -ItemType Directory -Force -Path $backupRoot | Out-Null
              $stamp  = Get-Date -Format 'yyyy-MM-dd_HH-mm-ss'
              $backup = Join-Path $backupRoot $stamp
              robocopy $live $backup /MIR /NFL /NDL /NP /NJH /NJS | Out-Null

              # deploy: mirror staging -> live
              $null = robocopy $staging $live /MIR /NFL /NDL /NP /NJH /NJS
              Write-Host ('ROBOCOPY exit code: ' + $LASTEXITCODE + ' (0/1 = success)')

              # ghi version.txt để kiểm tra nhanh
              $ver = @(
                'sha=${{ github.sha }}'
                'branch=${{ github.ref_name }}'
                'deployed=' + (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z'
              ) -join \"`r`n\"
              Set-Content -Path (Join-Path $live 'version.txt') -Value $ver -Encoding utf8

              # restart app pool
              Restart-WebAppPool -Name 'myapp-fe'
              Start-Sleep -Seconds 2
              (Get-WebAppPoolState 'myapp-fe').Value | Write-Host

              # in 10 file mới nhất để xác nhận
              Get-ChildItem $live -Recurse |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 10 FullName, LastWriteTime |
                Format-Table -AutoSize | Out-String | Write-Host
            "
