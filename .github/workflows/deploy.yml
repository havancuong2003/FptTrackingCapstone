name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]   # đổi nếu deploy từ nhánh khác

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -rq ../dist.zip .
          cd ..
          ls -l dist.zip

      - name: Ensure incoming dir on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path 'C:\deploy\incoming\fe' | Out-Null"

      - name: Upload dist.zip to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: dist.zip
          target: C:/deploy/incoming/fe

      - name: Deploy on VPS (PowerShell inline, no IIS commands)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: >
            powershell -NoProfile -ExecutionPolicy Bypass -Command
            "$ErrorActionPreference='Stop';
            $zip='C:\deploy\incoming\fe\dist.zip';
            $stg='C:\deploy\incoming\fe\_staging';
            $live='C:\sites\myapp-fe\dist';

            if(!(Test-Path $zip)){ throw 'Zip not found: ' + $zip };
            if(!(Test-Path $live)){ New-Item -ItemType Directory -Force -Path $live | Out-Null };

            if(Test-Path $stg){ Remove-Item $stg -Recurse -Force -ErrorAction SilentlyContinue };
            New-Item -ItemType Directory -Force -Path $stg | Out-Null;
            Expand-Archive -Path $zip -DestinationPath $stg -Force;

            # Mirror staging -> live, giữ web.config
            $null = robocopy $stg $live /MIR /XF web.config /NFL /NDL /NP /NJH /NJS;
            Write-Host ('ROBOCOPY exit code: ' + $LASTEXITCODE + ' (0/1 = success)');

            # Ghi version để kiểm chứng nhanh
            $stamp=(Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z';
            Set-Content -Encoding utf8 (Join-Path $live 'version.txt')
            \"sha=${{ github.sha }}`r`nbranch=${{ github.ref_name }}`r`ndeployed=$stamp\";
            @{sha='${{ github.sha }}';branch='${{ github.ref_name }}';deployed=$stamp}
            | ConvertTo-Json
            | Set-Content -Encoding utf8 (Join-Path $live 'version.json');

            # In vài file mới nhất để thấy timestamp đổi
            Get-ChildItem $live -Recurse | Sort LastWriteTime -Descending
            | Select -First 8 FullName, LastWriteTime
            | Format-Table -AutoSize | Out-String | Write-Host;"
