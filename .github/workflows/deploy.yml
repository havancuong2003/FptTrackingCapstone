name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]   # đổi nếu bạn deploy branch khác

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    env:
      # Đường dẫn trên VPS (Windows)
      INCOMING_DIR: 'C:\deploy\incoming\fe'
      INCOMING_DIR_POSIX: 'C:/deploy/incoming/fe'   # dùng cho SCP
      BACKUP_DIR: 'C:\deploy\backups\fe'
      LIVE_DIR: 'C:\sites\myapp-fe\dist'
      POOL_NAME: 'myapp-fe'
      ZIP_NAME:  'dist.zip'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build
        # Vite sẽ copy public/web.config vào dist/ (giữ nguyên file bạn đã cung cấp)

      # ----- ZIP NGAY Ở ROOT, không cd đi cd lại -----
      - name: Zip dist (1 file duy nhất)
        shell: bash
        run: |
          zip -rq "${ZIP_NAME}" dist
          ls -lh "${ZIP_NAME}"

      # ----- UPLOAD dist.zip -----
      - name: Upload dist.zip via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          port:     ${{ secrets.WIN_SSH_PORT || 22 }}
          source:   "${{ env.ZIP_NAME }}"
          target:   "${{ env.INCOMING_DIR_POSIX }}"    # dùng path kiểu POSIX cho scp
          strip_components: 0
          rm: false
          debug: false
          timeout: 60s
          command_timeout: 10m

      # ----- SSH 1: Tạo thư mục + giải nén -----
      - name: Ensure folders on VPS (ngắn) & unzip
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          port:     ${{ secrets.WIN_SSH_PORT || 22 }}
          script: |
            powershell -NoProfile -Command "$ErrorActionPreference='Stop'; $ProgressPreference='SilentlyContinue'; `
              New-Item -ItemType Directory -Force -Path 'C:\deploy\incoming\fe','C:\deploy\backups\fe','C:\sites\myapp-fe\dist' | Out-Null; `
              $stg = Join-Path 'C:\deploy\incoming\fe' '_staging'; `
              Remove-Item -Path $stg -Recurse -Force -ErrorAction SilentlyContinue; `
              $zip = Join-Path 'C:\deploy\incoming\fe' 'dist.zip'; `
              if (!(Test-Path $zip)) { throw 'Zip not found: ' + $zip }; `
              Expand-Archive -Path $zip -DestinationPath $stg -Force"


      # ----- SSH 2: Backup & mirror -----
      - name: Backup & Deploy (robocopy /MIR)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port:     ${{ secrets.WIN_SSH_PORT || 22 }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 15m
          script: |
            powershell -NoProfile -Command ^
              "$stamp = Get-Date -Format 'yyyyMMdd-HHmmss'; ^
               $staging = Join-Path '${{ env.INCOMING_DIR }}' '_staging'; ^
               $backup  = Join-Path '${{ env.BACKUP_DIR }}' $stamp; ^
               robocopy '${{ env.LIVE_DIR }}' $backup /MIR /NFL /NDL /NP /NJH /NJS | Out-Null; ^
               robocopy $staging '${{ env.LIVE_DIR }}' /MIR /NFL /NDL /NP /NJH /NJS; ^
               if ($LASTEXITCODE -gt 3) { exit 1 }"

      # ----- SSH 3: Sửa ACL (fix 401.3) + ghi version -----
      - name: Fix ACL for AppPool & write version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port:     ${{ secrets.WIN_SSH_PORT || 22 }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 10m
          script: |
            powershell -NoProfile -Command ^
              "$pool = '${{ env.POOL_NAME }}'; ^
               $sid  = 'IIS AppPool\{0}' -f $pool; ^
               # Bật kế thừa & cấp quyền Read+Execute cho AppPool (fix 401.3) ^
               icacls 'C:\sites','C:\sites\myapp-fe','${{ env.LIVE_DIR }}' /inheritance:e | Out-Null; ^
               icacls '${{ env.LIVE_DIR }}' /grant '$sid:(OI)(CI)(RX)' /T /C | Out-Null; ^
               # Ghi version.txt để kiểm tra nhanh ^
               $ver = @('repo=${{ github.repository }}', ^
                        'sha=${{ github.sha }}', ^
                        'branch=${{ github.ref_name }}', ^
                        'deployed=' + (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z') -join \"`r`n\"; ^
               Set-Content -Path (Join-Path '${{ env.LIVE_DIR }}' 'version.txt') -Value $ver -Encoding utf8; ^
               # In vài file mới nhất để confirm ^
               Get-ChildItem '${{ env.LIVE_DIR }}' -Recurse | Sort LastWriteTime -Desc | Select -First 8 FullName,LastWriteTime | Format-Table -AutoSize | Out-String | Write-Host"
