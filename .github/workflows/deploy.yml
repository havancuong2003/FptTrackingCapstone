name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        run: |
          npm ci
          npm run build
        # Vite sẽ copy public/web.config vào dist/

      # Tạo trước thư mục đích theo SHA để tránh lỗi permission trên scp
      - name: Prepare target folder on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $dir = 'C:\deploy\incoming\fe\${{ github.sha }}'
              New-Item -ItemType Directory -Force -Path $dir | Out-Null
              Write-Host ('Created ' + $dir)
            "

      - name: Upload dist to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: "dist/*"
          target: "C:/deploy/incoming/fe/${{ github.sha }}/"
          debug: true

      - name: Atomic deploy on VPS (PowerShell)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          username: ${{ secrets.WIN_USER }}
          port: ${{ secrets.WIN_SSH_PORT }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $sha = '${{ github.sha }}'
              $incoming = 'C:\deploy\incoming\fe\' + $sha
              $live = 'C:\sites\myapp-fe\dist'

              if (!(Test-Path $incoming)) { throw 'Incoming folder not found: ' + $incoming }
              if (!(Test-Path $live)) { New-Item -ItemType Directory -Force -Path $live | Out-Null }

              # backup nhanh để rollback
              $backupRoot = 'C:\deploy\backups\fe'
              New-Item -ItemType Directory -Force -Path $backupRoot | Out-Null
              $stamp = Get-Date -Format 'yyyyMMdd-HHmmss'
              $backup = Join-Path $backupRoot $stamp
              robocopy $live $backup /MIR /NFL /NDL /NP /NJH /NJS | Out-Null

              # triển khai phiên bản mới
              robocopy $incoming $live /MIR /NFL /NDL /NP /NJH /NJS | Out-Null

              # refresh app pool (đổi tên nếu bạn đặt khác)
              Import-Module WebAdministration
              Restart-WebAppPool -Name 'myapp-fe'
            "
