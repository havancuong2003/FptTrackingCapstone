name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]   # đổi nếu deploy nhánh khác

jobs:
  fe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build
        # Lưu ý: web.config phải nằm trong public/ để Vite copy vào dist/

      - name: Upload dist to VPS (SCP, no zip)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          source: "dist/*"
          target: "C:/deploy/incoming/fe/${{ github.sha }}/"

      - name: Deploy on VPS (PowerShell, robocopy /MIR)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WIN_HOST }}
          port: ${{ secrets.WIN_SSH_PORT }}
          username: ${{ secrets.WIN_USER }}
          password: ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            $ErrorActionPreference = 'Stop'

            $sha      = '${{ github.sha }}'
            $incoming = "C:\deploy\incoming\fe\$sha"
            $live     = "C:\sites\myapp-fe\dist"

            if (!(Test-Path $incoming)) { throw "Incoming not found: $incoming" }
            if (!(Test-Path $live))     { New-Item -ItemType Directory -Force -Path $live | Out-Null }

            # Mirror incoming -> live (xóa file thừa, thay file cũ)
            $null = robocopy $incoming $live /MIR /NFL /NDL /NP /NJH /NJS
            Write-Host ("ROBOCOPY exit code: " + $LASTEXITCODE + " (0/1 = OK)")

            # Ghi version.txt để check nhanh
            $ver = @(
              "sha=${{ github.sha }}",
              "branch=${{ github.ref_name }}",
              "deployed=" + (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z'
            ) -join "`r`n"
            Set-Content -Path (Join-Path $live 'version.txt') -Value $ver -Encoding utf8

            # In vài file mới nhất để xác nhận
            Get-ChildItem $live -Recurse |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 8 FullName, LastWriteTime |
              Format-Table -AutoSize | Out-String | Write-Host
