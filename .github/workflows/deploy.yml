name: Build & Deploy FE to IIS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: fe-deploy
  cancel-in-progress: true

env:
  INCOMING_DIR: 'C:\deploy\incoming\fe'
  BACKUP_DIR:   'C:\deploy\backups\fe'
  LIVE_DIR:     'C:\sites\myapp-fe\dist'
  APP_POOL_NAME: 'myapp-fe' # Thêm biến này để lưu tên app pool

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build (Vite)
        run: |
          npm ci
          npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -rq ../dist.zip .
          cd ..

      # ==== Upload: dùng scp thuần, tránh lỗi SFTP với /C:/ ====
      - name: Upload dist.zip via native scp
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.WIN_PASSWORD }}" \
            scp -P ${{ secrets.WIN_SSH_PORT }} -o StrictHostKeyChecking=no \
            dist.zip "${{ secrets.WIN_USER }}@${{ secrets.WIN_HOST }}:/C:/deploy/incoming/fe/dist.zip"

      # ==== Deploy trên VPS ====
      - name: Deploy on VPS (PowerShell)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:       ${{ secrets.WIN_HOST }}
          port:       ${{ secrets.WIN_SSH_PORT }}
          username:   ${{ secrets.WIN_USER }}
          password:   ${{ secrets.WIN_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $ErrorActionPreference = 'Stop'
              $incoming = '${{ env.INCOMING_DIR }}'
              $backupRoot = '${{ env.BACKUP_DIR }}'
              $live = '${{ env.LIVE_DIR }}'
              $zip  = Join-Path $incoming 'dist.zip'
              $stg  = Join-Path $incoming '_staging'

              New-Item -ItemType Directory -Force -Path $incoming,$backupRoot,$live | Out-Null
              if (!(Test-Path $zip)) { throw 'Zip not found: ' + $zip }

              Remove-Item -Path $stg -Recurse -Force -ErrorAction SilentlyContinue
              New-Item -ItemType Directory -Force -Path $stg | Out-Null
              Expand-Archive -Path $zip -DestinationPath $stg -Force

              $stamp = Get-Date -Format 'yyyyMMdd-HHmmss'
              $backup = Join-Path $backupRoot $stamp
              robocopy $live $backup /MIR /NFL /NDL /NP /NJH /NJS | Out-Null

              robocopy $stg $live /MIR /NFL /NDL /NP /NJH /NJS | Out-Null

              $ver = @(
                'sha=${{ github.sha }}'
                'branch=${{ github.ref_name }}'
                'deployed=' + (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss') + 'Z'
              ) -join \"`r`n\"
              Set-Content -Path (Join-Path $live 'version.txt') -Value $ver -Encoding utf8

              Get-ChildItem $live -Recurse |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 10 FullName, LastWriteTime |
                Format-Table -AutoSize | Out-String | Write-Host
            "

      - name: Show version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:       ${{ secrets.WIN_HOST }}
          port:       ${{ secrets.WIN_SSH_PORT }}
          username:   ${{ secrets.WIN_USER }}
          password:   ${{ secrets.WIN_PASSWORD }}
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $live = '${{ env.LIVE_DIR }}'
              icacls $live /inheritance:e
              icacls $live /grant "IIS_IUSRS:(OI)(CI)(RX)" /T /C
              icacls $live /grant "IUSR:(OI)(CI)(RX)" /T /C
              icacls $live /grant "IIS AppPool\<TEN_APP_POOL>:(OI)(CI)(RX)" /T /C
              cipher /d /s:$live
              $vf = Join-Path $live 'version.txt'
              if (Test-Path $vf) { Get-Content $vf | Write-Host } else { Write-Host 'version.txt not found' }
            "
